name: Frontend React Harness CI

on:
  push:
    paths:
      - "frontend-react-harness/**"
      - ".github/workflows/frontend-react-harness-ci.yml"
  pull_request:
    paths:
      - "frontend-react-harness/**"
      - ".github/workflows/frontend-react-harness-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react-harness

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react-harness/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-react-harness-coverage
          path: |
            frontend-react-harness/coverage
